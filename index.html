<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expire Dates System</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 0;
      margin: 0;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      position: sticky;
      top: 0;
      background: var(--tg-theme-bg-color, #ffffff);
      z-index: 10;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px 0;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 10px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      outline: none;
    }
    .search-box:focus {
      border-color: var(--tg-theme-button-color, #2481cc);
    }
    .status {
      padding: 16px;
      text-align: center;
      color: var(--tg-theme-hint-color, #888);
      font-size: 14px;
    }
    .product-list {
      padding: 8px 16px 32px;
    }
    .product-item {
      padding: 14px 12px;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      font-size: 15px;
    }
    .product-id {
      font-size: 11px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 2px;
      font-family: monospace;
    }
    .product-name {
      font-weight: 500;
    }
    .count-info {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📦 Products Catalog</h1>
    <input type="text" class="search-box" id="search" placeholder="Search product...">
  </div>
  
  <div class="count-info" id="countInfo">Loading products...</div>
  <div class="product-list" id="productList"></div>

  <script>
    // ⚠️ REPLACE THIS WITH YOUR API URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbwhj6lHg84JLxQl41hB4luCFwn6zMP8cw9Azm8b4WjSmm0EQFzjYheEVZl69-HkO804bQ/exec';
    
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    let allProducts = [];
    
    async function loadProducts() {
      try {
        const response = await fetch(API_URL + '?action=getProducts');
        const data = await response.json();
        
        if (data.error) {
          document.getElementById('countInfo').textContent = 'Error: ' + data.error;
          return;
        }
        
        allProducts = data.products || [];
        renderProducts(allProducts);
      } catch (err) {
        document.getElementById('countInfo').textContent = 'Failed to load. Check API URL.';
        console.error(err);
      }
    }
    
    function renderProducts(products) {
      const list = document.getElementById('productList');
      const info = document.getElementById('countInfo');
      
      info.textContent = products.length + ' products';
      
      if (products.length === 0) {
        list.innerHTML = '<div class="status">No products match your search</div>';
        return;
      }
      
      list.innerHTML = products.map(p => `
        <div class="product-item">
          <div class="product-id">${p.product_id}</div>
          <div class="product-name">${escapeHtml(p.name)}</div>
        </div>
      `).join('');
    }
    
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    
    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      if (!query) {
        renderProducts(allProducts);
        return;
      }
      const filtered = allProducts.filter(p => 
        p.name.toLowerCase().includes(query) || 
        p.product_id.toLowerCase().includes(query)
      );
      renderProducts(filtered);
    });
    
    loadProducts();
  </script>
</body>
</html>
