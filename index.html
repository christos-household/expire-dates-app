<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expire Dates System</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 20px;
      margin: 0;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      margin-top: 40px;
    }
    .info {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      padding: 16px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: left;
    }
    .info p {
      margin: 8px 0;
      font-size: 14px;
    }
    .label {
      color: var(--tg-theme-hint-color, #888);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>📦 Expire Dates System</h1>
  <p id="greeting">Loading...</p>
  
  <div class="info">
    <p><span class="label">User ID:</span> <span id="user-id">-</span></p>
    <p><span class="label">Name:</span> <span id="user-name">-</span></p>
    <p><span class="label">Platform:</span> <span id="platform">-</span></p>
  </div>

  <p style="margin-top: 40px; color: var(--tg-theme-hint-color, #888); font-size: 12px;">
    Session 2 — Hello World ✓
  </p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    const user = tg.initDataUnsafe.user;
    
    if (user) {
      document.getElementById('greeting').textContent = `Hello, ${user.first_name}! 👋`;
      document.getElementById('user-id').textContent = user.id;
      document.getElementById('user-name').textContent = `${user.first_name} ${user.last_name || ''}`;
      document.getElementById('platform').textContent = tg.platform;
    } else {
      document.getElementById('greeting').textContent = 'Open this from Telegram to see your info';
    }
  </script>
</body>
</html>
